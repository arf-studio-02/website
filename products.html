<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
    Arf.Store | Products
</title>

<!-- GLOBAL CSS -->
<link rel="stylesheet"
href="css/base.css">

<!-- TOPBAR CSS -->
<link rel="stylesheet"
href="css/top-bar.css">

<!-- PAGE CSS -->
<link rel="stylesheet"
href="css/products.css">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- TOPBAR -->
<div id="topbar"></div>

<!-- PRODUCTS PAGE -->
<section class="products-page">

    <!-- HEADER -->
    <div class="products-header">

        <h1 data-products="title">
            Our Products
        </h1>

        <p data-products="desc">
            Choose the best service for your business
        </p>

    </div>

    <!-- GRID -->
    <div class="products-grid">

        <!-- CARD -->
        <div class="product-card">

            <div class="product-icon">
                <i class="fa-solid fa-globe"></i>
            </div>

            <h2 data-products="webTitle">
                Website Basic
            </h2>

            <p data-products="webDesc">
                Simple landing page website
            </p>

            <button class="buy-btn"
            data-products="buyNow">
                Buy Now
            </button>

        </div>

        <!-- CARD -->
        <div class="product-card">

            <div class="product-icon">
                <i class="fa-solid fa-store"></i>
            </div>

            <h2 data-products="shopTitle">
                Online Shop
            </h2>

            <p data-products="shopDesc">
                Modern online store for your business
            </p>

            <button class="buy-btn"
            data-products="buyNow">
                Buy Now
            </button>

        </div>

        <!-- CARD -->
        <div class="product-card">

            <div class="product-icon">
                <i class="fa-solid fa-mobile-screen"></i>
            </div>

            <h2 data-products="appTitle">
                Mobile App
            </h2>

            <p data-products="appDesc">
                Android application development
            </p>

            <button class="buy-btn"
            data-products="buyNow">
                Buy Now
            </button>

        </div>

    </div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD COMPONENT -->
<script>

Promise.all([

    fetch("components/top-bar.html")
    .then(res => res.text()),

    fetch("components/footer.html")
    .then(res => res.text())

]).then(([topbar, footer]) => {

    document.getElementById("topbar")
    .innerHTML = topbar;

    document.getElementById("footer")
    .innerHTML = footer;

    /* INIT */

    initTopbar();

    applyLanguage();

    applyProductsLanguage();

});

</script>

<script src="js/language.js"></script>
<script src="js/products-language.js"></script>
<script src="js/top-bar.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>

</body>
</html>
